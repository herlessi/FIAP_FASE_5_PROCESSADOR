apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: processadorvideo-hpa
  namespace: processamentovideo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: processadorvideo
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 10
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 10