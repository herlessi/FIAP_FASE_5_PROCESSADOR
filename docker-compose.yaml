services:
  db:
    image: postgres:15
    container_name: db_ms_processadorvideo
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: processadorvideo
    ports:
      - "5433:5432"
    volumes:
      - db_data_processadorvideo:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  db_data_processadorvideo:

networks:
  app-network:
    driver: bridge  